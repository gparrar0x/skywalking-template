name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 10"
          trigger_phrase: "@claude"
          prompt: |
            Review this PR as a strict senior engineer. For every file changed:

            1. **Bugs & correctness**: null safety, off-by-one, race conditions, missing error handling
            2. **Security**: injection, exposed secrets, auth bypass, unsafe input
            3. **Performance**: N+1 queries, unnecessary re-renders, missing memoization, dead code
            4. **Code quality**: duplicated logic, inconsistent patterns, missing types, naming
            5. **Tests**: missing test coverage for new logic

            Be specific. Reference file:line. Suggest fixes with code blocks.
            If everything is clean, leave a single comment confirming the review passed.
            Do NOT skip files. Do NOT be lenient. Flag anything you would flag in a real code review.
